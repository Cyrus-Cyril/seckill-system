services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: seckill-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "8848:8848"

  mysql:
    image: mysql:8.4
    container_name: seckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_system
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: seckill-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: seckill-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: seckill-sentinel-dashboard
    environment:
      SERVER_PORT: 8858
    ports:
      - "8858:8858"

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: seckill-user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
    depends_on:
      - nacos
      - mysql
    ports:
      - "8081:8080"

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: seckill-product-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
    ports:
      - "8082:8080"

  order-service-1:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: seckill-order-service-1
    environment:
      SPRING_PROFILES_ACTIVE: docker
      INSTANCE_ID: order1
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
      - product-service
      - sentinel-dashboard
    ports:
      - "8083:8080"

  order-service-2:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: seckill-order-service-2
    environment:
      SPRING_PROFILES_ACTIVE: docker
      INSTANCE_ID: order2
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
    depends_on:
      - nacos
      - mysql
      - redis
      - kafka
      - product-service
      - sentinel-dashboard
    ports:
      - "8084:8080"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: seckill-gateway
    environment:
      GATEWAY_PORT: 8080
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
    depends_on:
      - nacos
      - user-service
      - product-service
      - order-service-1
      - order-service-2
    ports:
      - "8088:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    depends_on:
      - gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  mysql-data:
  redis-data:
