services:
  mysql:
    image: mysql:8.4
    container_name: seckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill_system
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: seckill-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app1:
    build: .
    container_name: seckill-app1
    environment:
      SPRING_PROFILES_ACTIVE: docker
      INSTANCE_ID: app1
    depends_on:
      - mysql
      - redis
    ports:
      - "8081:8080"

  app2:
    build: .
    container_name: seckill-app2
    environment:
      SPRING_PROFILES_ACTIVE: docker
      INSTANCE_ID: app2
    depends_on:
      - mysql
      - redis
    ports:
      - "8082:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    depends_on:
      - app1
      - app2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  mysql-data:
  redis-data: