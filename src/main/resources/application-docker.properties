server.port=8080
spring.application.name=seckill-system

spring.datasource.url=jdbc:mysql://mysql:3306/seckill_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true

instance.id=${INSTANCE_ID:docker}

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=seckill-order-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.seckill.order.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.seckill.order.messaging.SeckillOrderMessage
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

seckill.kafka.topic=seckill-order-topic
seckill.redis.stock-prefix=seckill:stock:
seckill.redis.user-order-prefix=seckill:order:user:
seckill.id.worker-id=1
seckill.id.datacenter-id=1
