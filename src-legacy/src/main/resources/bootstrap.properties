spring.application.name=seckill-system

spring.cloud.nacos.server-addr=${NACOS_ADDR:127.0.0.1:8848}
spring.cloud.nacos.username=${NACOS_USERNAME:nacos}
spring.cloud.nacos.password=${NACOS_PASSWORD:nacos}

spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.discovery.namespace=${NACOS_NAMESPACE:}
spring.cloud.nacos.discovery.group=${NACOS_GROUP:DEFAULT_GROUP}
spring.cloud.nacos.discovery.metadata.instanceId=${instance.id:${HOSTNAME:local}}

spring.cloud.nacos.config.enabled=true
spring.cloud.nacos.config.namespace=${NACOS_NAMESPACE:}
spring.cloud.nacos.config.group=${NACOS_GROUP:DEFAULT_GROUP}
spring.cloud.nacos.config.file-extension=properties
spring.cloud.nacos.config.refresh-enabled=true
spring.cloud.nacos.config.shared-configs[0].data-id=shared-seckill.properties
spring.cloud.nacos.config.shared-configs[0].group=${NACOS_GROUP:DEFAULT_GROUP}
spring.cloud.nacos.config.shared-configs[0].refresh=true
